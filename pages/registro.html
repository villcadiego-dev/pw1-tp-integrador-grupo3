<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruta 3 Vuelos - Registro</title>
    <link rel="icon" type="image/png" href="../assets/images/Header.PNG">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <main class="login-container">
        <section class="login-card">
            <article class="login-header">
                  <a href="./inicio.html" class="brand">
                     <img src="../assets/images/Logo.png" alt="Ruta 3 Vuelos">
                  </a>
                <h1>Crea tu cuenta</h1>
                <p>Únete a nosotros y empieza a planificar tu próximo viaje.</p>
            </article>

            <form action="#" class="login-form">
                <div class="form-group">
                    <label for="name">Nombre</label>
                    <div class="input-icon">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="name" placeholder="Juan" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="lastname">Apellido</label>
                    <div class="input-icon">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="fullname" placeholder="Perez" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <div class="input-icon">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="email" placeholder="ejemplo@correo.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-icon">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="Crea una contraseña" required>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" required> Acepto los términos y condiciones
                    </label>
                </div>

                <button type="submit" class="btn-login">Registrarse</button>
            </form>

            <footer class="login-footer">
                <p>¿Ya tienes una cuenta? <a href="login.html">Inicia sesión aquí</a></p>
            </footer>
        </section>
    </main>
</body>
</html>
