<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruta 3 Vuelos - Iniciar Sesión</title>
    <link rel="icon" type="image/png" href="../assets/images/Header.PNG">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <main class="login-container">
        <section class="login-card">
            <header class="login-header">
                <div class="logo">Ruta 3 Vuelos</div>
                <h1>¡Hola de nuevo!</h1>
                <p>Ingresa a tu cuenta para gestionar tus vuelos.</p>
            </header>

            <form action="#" class="login-form">
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <div class="input-icon">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="email" placeholder="ejemplo@correo.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-icon">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> Recordarme
                    </label>
                    <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn-login">Iniciar Sesión</button>
            </form>

            <footer class="login-footer">
                <p>¿No tienes una cuenta? <a href="#">Regístrate aquí</a></p>
            </footer>
        </section>
    </main>
</body>
</html>
