<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ruta 3 Vuelos - Recuperar Contraseña</title>
    <link rel="icon" type="image/png" href="../assets/images/Header.PNG">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/micuenta.css" />
</head>
<body>
    <main class="account-container">
        <section class="account-content seguridad">
            <article class="content-section">
                <h2>Recuperar contraseña</h2>
                <p>Ingresa tu dirección de email y te enviaremos un enlace para restablecer tu contraseña.</p>
                <form>
                    <div class="campo">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <a class="btn-confirmar" href="login.html">Confirmar</a>
                </form>
            </article>
        </section>
    </main>
</body>
</html>
